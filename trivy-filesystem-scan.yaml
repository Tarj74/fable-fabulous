format: table

severity:
  - CRITICAL
  - HIGH

exit-code: 1

ignore-unfixed: true

cache:
  enabled: false

scan:
  scanners:
    - vuln
    - secret
    - misconfig

  skip-dirs:
    - .git
    - node_modules
    - dist
    - build

  skip-files:
    - "*.log"

secret:
  config: ""   # default rules


# USAGE:
## Install trivy via curl on your system
## RUN: trivy fs --config trivy-filesystem.yaml .

## NOTE: RUN BEFORE EACH COMMIT TO CATCH ISSUES EARLY
